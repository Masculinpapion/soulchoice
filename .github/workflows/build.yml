name: Flutter APK Build

on:
  push:
    branches: [ main, design/aurora ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Manuel tetikleme butonu

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java kur (Gradle için)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3. Flutter kur
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4. Pub cache
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      # 5. Sabit debug keystore'u yerleştir (adb install -r için imza tutarlılığı)
      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore

      # 6. Bağımlılıkları yükle
      - name: Flutter pub get
        run: flutter pub get

      # 7. Debug APK build et (signing gerekmez, telefona direkt kurulur)
      - name: Build APK
        run: flutter build apk --debug --no-pub

      # 8. APK'yı artifact olarak yükle (7 gün saklanır)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: soulchoice-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # 9. Build bilgisi
      - name: Build summary
        run: |
          echo "✅ Build #${{ github.run_number }} tamamlandı"
          echo "APK boyutu: $(du -sh build/app/outputs/flutter-apk/app-debug.apk | cut -f1)"
