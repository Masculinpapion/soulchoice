name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore
          printf 'storeFile=%s/.android/debug.keystore\nstorePassword=android\nkeyAlias=androiddebugkey\nkeyPassword=android\n' "$HOME" > android/key.properties

      - run: flutter pub get

      # iOS workflow'uyla aynı desen: versionCode = CI run numarası.
      # Uygulama içi "Hakkında" ile mağaza numarası eşleşir (16.07 bulgusu).
      - name: Bump build number to CI run number
        run: |
          sed -i -E "s/^version: ([^+]+)\+.*/version: \1+${{ github.run_number }}/" pubspec.yaml

      - run: flutter build apk --debug --no-pub

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Debug APK (latest)"
          prerelease: true
          files: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/soulchoice-release.jks
          printf 'storeFile=soulchoice-release.jks\nstorePassword=soulchoice2026\nkeyAlias=soulchoice\nkeyPassword=soulchoice2026\n' > android/key.properties

      - run: flutter pub get

      # Debug job'la aynı run numarası — APK ve AAB aynı versionCode taşır.
      - name: Bump build number to CI run number
        run: |
          sed -i -E "s/^version: ([^+]+)\+.*/version: \1+${{ github.run_number }}/" pubspec.yaml

      - run: flutter build appbundle --release --no-pub

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-release
          name: "Release AAB (latest)"
          prerelease: false
          files: build/app/outputs/bundle/release/app-release.aab

  deploy-functions:
    needs: build-debug
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Edge Functions to Timeweb
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 89.169.1.127
          username: root
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          script: |
            cd /tmp && rm -rf sc_deploy
            git clone https://${{ secrets.GH_DEPLOY_TOKEN }}@github.com/Masculinpapion/soulchoice.git sc_deploy
            # Canlı edge-functions container /root/volumes/functions'tan mount ediyor.
            # (Eski /root/supabase/docker/volumes/functions ölü — container ona bakmıyor.)
            cp -r /tmp/sc_deploy/supabase/functions/* /root/volumes/functions/
            rm -rf /tmp/sc_deploy
            docker restart supabase-edge-functions
