name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '**.md'
      - 'landing/**'
      - 'supabase/**'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.x'
          cache: true

      - name: Bump build number to CI run number
        run: |
          # version: 1.0.0+<old> → 1.0.0+<github.run_number>
          sed -i.bak -E "s/^version: ([^+]+)\\+.*/version: \\1+${{ github.run_number }}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Write App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

      - name: Generate ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>GCGPLKY4Q4</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          flutter build ipa --release \
            --export-options-plist=/tmp/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          IPA=$(ls build/ios/ipa/*.ipa | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::IPA not found"
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-build-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 14
          if-no-files-found: warn
