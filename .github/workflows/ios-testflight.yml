name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '**.md'
      - 'landing/**'
      - 'supabase/**'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (Swift 6 for Firebase iOS SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.x'
          cache: true

      - name: Bump build number to CI run number
        run: |
          sed -i.bak -E "s/^version: ([^+]+)\\+.*/version: \\1+${{ github.run_number }}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Install Apple Distribution certificate to keychain
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: build-keychain-pw-${{ github.run_id }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/dist.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/dist.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f /tmp/dist.p12

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          # Show profile info for debugging
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision | grep -A1 -E '<key>(UUID|Name|TeamIdentifier|application-identifier)</key>' | head -20

      - name: Write App Store Connect API key (for altool upload)
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

      - name: Generate ExportOptions.plist (manual signing)
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>GCGPLKY4Q4</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.soulchoice.soulchoice</key>
              <string>SoulChoice AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Flutter build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Xcode archive (manual signing with installed cert+profile)
        working-directory: ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            DEVELOPMENT_TEAM=GCGPLKY4Q4 \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="SoulChoice AppStore" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -destination 'generic/platform=iOS' \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          IPA=$(ls "$RUNNER_TEMP"/ipa/*.ipa | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::IPA not found"
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-build-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
