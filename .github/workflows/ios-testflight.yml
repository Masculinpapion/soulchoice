name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '**.md'
      - 'landing/**'
      - 'supabase/**'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (Swift 6 for Firebase iOS SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.x'
          cache: true

      - name: Bump build number to CI run number
        run: |
          sed -i.bak -E "s/^version: ([^+]+)\\+.*/version: \\1+${{ github.run_number }}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      # ===== Apple's official actions for signing =====

      - name: Import Apple Distribution certificate (apple-actions)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/SoulChoice_AppStore.mobileprovision
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/SoulChoice_AppStore.mobileprovision | grep -E '<key>(UUID|Name|TeamIdentifier|application-identifier)</key>' -A1 | head -16

      - name: Write App Store Connect API key (for altool upload)
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

      - name: Generate ExportOptions.plist (manual signing — only Runner)
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>GCGPLKY4Q4</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.soulchoice.soulchoice</key>
              <string>SoulChoice AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      # ===== Build IPA via Flutter (uses installed cert+profile, manages SPM/Pods sign separately) =====

      - name: Flutter build IPA
        run: flutter build ipa --release --export-options-plist=/tmp/ExportOptions.plist

      # dSYM'leri Crashlytics'e yükle ki iOS çökmeleri sembolize gelsin.
      # non-fatal: aracı/dSYM bulunamazsa yalnızca uyarır, release'i ASLA kırmaz.
      - name: Upload dSYMs to Crashlytics
        continue-on-error: true
        run: |
          UPLOAD=$(find /Users/runner/Library/Developer/Xcode/DerivedData ~/Library/Developer/Xcode/DerivedData -name upload-symbols 2>/dev/null | grep -i firebase | head -1)
          GSP="$PWD/ios/Runner/GoogleService-Info.plist"
          DSYM_DIR=$(ls -d "$PWD"/build/ios/archive/*.xcarchive/dSYMs 2>/dev/null | head -1)
          echo "upload-symbols=$UPLOAD"
          echo "gsp=$GSP dsym=$DSYM_DIR"
          if [ -n "$UPLOAD" ] && [ -f "$GSP" ] && [ -d "$DSYM_DIR" ]; then
            "$UPLOAD" -gsp "$GSP" -p ios "$DSYM_DIR"
          else
            echo "::warning::dSYM upload skipped (upload-symbols or dSYM dir not found)"
          fi

      - name: Upload to TestFlight
        run: |
          IPA=$(ls build/ios/ipa/*.ipa | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::IPA not found"
            ls -R build/ios/ || true
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-build-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 14
          if-no-files-found: warn
