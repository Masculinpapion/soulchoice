name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '**.md'
      - 'landing/**'
      - 'supabase/**'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (Swift 6 needed for Firebase iOS SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.x'
          cache: true

      - name: Bump build number to CI run number
        run: |
          sed -i.bak -E "s/^version: ([^+]+)\\+.*/version: \\1+${{ github.run_number }}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

      - name: Generate ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>GCGPLKY4Q4</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Flutter build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Xcode archive with cloud signing
        working-directory: ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8 \
            -authenticationKeyID $API_KEY_ID \
            -authenticationKeyIssuerID $API_ISSUER_ID \
            DEVELOPMENT_TEAM=GCGPLKY4Q4 \
            CODE_SIGN_STYLE=Automatic \
            -destination 'generic/platform=iOS' \
            archive

      - name: Export + Upload to TestFlight (single xcodebuild action, Cloud Signing)
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8 \
            -authenticationKeyID $API_KEY_ID \
            -authenticationKeyIssuerID $API_ISSUER_ID

      - name: Upload xcarchive as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive-build-${{ github.run_number }}
          path: ${{ runner.temp }}/Runner.xcarchive
          retention-days: 14
          if-no-files-found: warn
