name: Places Pipeline

# OSM dump'larını GEÇİCİ GitHub runner'da işler (Mac/prod'a dokunmaz),
# çıktı: şehir başına places_*.csv artifact'i. Runner iş bitince yok edilir.
on:
  workflow_dispatch:
    inputs:
      cities:
        description: "Virgülle şehirler: moscow,spb,istanbul,dubai,london,berlin"
        required: false
        default: "moscow,spb"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: osmium kur
        run: sudo apt-get update -qq && sudo apt-get install -y -qq osmium-tool

      - name: Pipeline çalıştır
        run: bash tools/places_pipeline/build_places.sh "${{ inputs.cities }}"

      - name: CSV artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: places-csv
          path: out/*.csv
          retention-days: 14
