name: soulchoice
description: "SoulChoice — Choose Your Night"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.3

  # Supabase
  supabase_flutter: ^2.8.4

  # Firebase (Push notifications) — henüz aktif değil, google-services.json olmadan CI patlar
  # firebase_core: ^3.13.0
  # firebase_messaging: ^15.2.5

  # Local auth (FaceID/TouchID)
  local_auth: ^2.3.0

  # Phone number validation
  phone_numbers_parser: ^9.0.21

  # Image picker & cropper
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  flutter_image_compress: ^2.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI utils
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  flutter_staggered_grid_view: ^0.7.0
  timeago: ^3.7.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  share_plus: ^12.0.2
  flutter_secure_storage: ^9.2.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.4

  # Analytics & Monitoring
  sentry_flutter: ^9.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.2
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0B"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/
    - assets/icons/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
        - asset: assets/fonts/Fraunces-Italic.ttf
          style: italic
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
